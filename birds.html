<head>

  <style>
    :root {
      --bg: #ffffff;
      --panel: #f5f6f5;
      --blue-light: #e3e5e8;
      --blue-mid: #90969d;
      --text: #15181c;
      --text-muted: #5c636b;
      --accent: #2f6b46;
      --border: #e3e5e8;
      --font: 'Inter', -apple-system, sans-serif;
      --font-heading: 'IBM Plex Mono', ui-monospace, monospace;
      --radius: 6px;
      --tr: 0.15s ease;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14.5px; }
    html, body { height: 100%; font-family: var(--font); color: var(--text); background: var(--bg); -webkit-font-smoothing: antialiased; }

    /* ---- Header ---- */
    .pg-header {
      height: 52px; display: flex; align-items: center; gap: 1rem;
      padding: 0 1.25rem; border-bottom: 1px solid var(--border);
      background: var(--bg); position: sticky; top: 0; z-index: 300;
    }
    .back-link {
      display: flex; align-items: center; gap: 0.35rem;
      color: var(--text-muted); text-decoration: none;
      font-family: var(--font-heading); font-size: 0.7rem; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase;
      transition: color var(--tr);
    }
    .back-link:hover { color: var(--accent); }
    .pg-header h1 {
      font-family: var(--font-heading); font-size: 0.82rem; font-weight: 600;
      letter-spacing: 0.04em; text-transform: uppercase; color: var(--text);
    }
    .hdr-stats {
      margin-left: auto; display: flex; gap: 1.25rem;
      font-family: var(--font-heading); font-size: 0.7rem; color: var(--text-muted);
    }
    .hdr-stats strong { color: var(--text); }

    /* ---- Layout ---- */
    .app { display: flex; height: calc(100vh - 52px); }
    .map-pane { flex: 1 1 auto; position: relative; }
    #map { width: 100%; height: 100%; }

    /* ---- Sidebar ---- */
    .sidebar {
      flex: 0 0 340px; display: flex; flex-direction: column;
      border-left: 1px solid var(--border); background: var(--bg); overflow: hidden;
    }
    .search-wrap { padding: 0.6rem 0.75rem; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .search-wrap input {
      width: 100%; padding: 0.36rem 0.7rem;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--panel); color: var(--text);
      font-family: var(--font); font-size: 0.8rem; outline: none;
      transition: border-color var(--tr);
    }
    .search-wrap input:focus { border-color: var(--blue-mid); }
    .search-wrap input::placeholder { color: var(--text-muted); }

    .species-list {
      flex: 1 1 auto; overflow-y: auto; padding: 0.35rem 0;
    }
    .species-list::-webkit-scrollbar { width: 5px; }
    .species-list::-webkit-scrollbar-track { background: transparent; }
    .species-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ---- Species card ---- */
    .species-card {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.5rem 0.85rem; cursor: pointer;
      transition: background var(--tr); border-left: 3px solid transparent;
    }
    .species-card:hover { background: var(--panel); }
    .species-card.active { background: var(--panel); border-left-color: var(--accent); }

    .sp-photo {
      width: 50px; height: 50px; border-radius: 8px; object-fit: cover;
      flex-shrink: 0; border: 1px solid var(--border); display: block;
    }
    .sp-placeholder {
      width: 50px; height: 50px; border-radius: 8px; flex-shrink: 0;
      border: 1px solid var(--border); background: var(--panel);
      display: flex; align-items: center; justify-content: center;
      color: var(--blue-mid); font-size: 1.1rem;
    }
    .sp-info { min-width: 0; flex: 1; }
    .sp-name {
      font-size: 0.82rem; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sp-sci {
      font-size: 0.67rem; font-style: italic; color: var(--text-muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sp-meta { font-family: var(--font-heading); font-size: 0.62rem; color: var(--blue-mid); margin-top: 0.15rem; }

    /* ---- Map controls ---- */
    .map-reset {
      position: absolute; top: 12px; right: 12px; z-index: 500;
      background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 0.3rem 0.65rem; font-family: var(--font-heading); font-size: 0.65rem;
      font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase;
      color: var(--text-muted); cursor: pointer; display: none; transition: all var(--tr);
    }
    .map-reset:hover { color: var(--accent); border-color: var(--accent); }
    .map-reset.visible { display: block; }

    /* ---- Legend ---- */
    .map-legend {
      background: rgba(255,255,255,0.92); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 0.5rem 0.7rem;
      font-family: var(--font); font-size: 0.66rem; backdrop-filter: blur(4px);
    }
    .legend-title {
      font-family: var(--font-heading); font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 0.3rem;
    }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; padding: 0.1rem 0; color: var(--text-muted); }
    .legend-dot {
      width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
      border: 1.5px solid rgba(255,255,255,0.6);
    }

    /* ---- Leaflet tooltip (hover) ---- */
    .leaflet-tooltip {
      background: #ffffff !important;
      border: 1px solid #e3e5e8 !important;
      border-radius: 6px !important;
      box-shadow: 0 4px 16px rgba(21,24,28,0.12) !important;
      padding: 7px 11px !important;
      pointer-events: none !important;
      transition: opacity 0.06s ease !important;
    }
    .leaflet-tooltip::before { border-top-color: #e3e5e8 !important; }
    .tip-name  { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.84rem; color: #15181c; }
    .tip-photo { display: block; width: 84px; height: 84px; object-fit: cover; border-radius: 6px; margin: 0.35rem 0; }
    .tip-sci   { font-family: 'Inter', sans-serif; font-size: 0.67rem; font-style: italic; color: #5c636b; }
    .tip-loc   { font-family: 'IBM Plex Mono', monospace; font-size: 0.64rem; color: #90969d; margin-top: 0.2rem; }

    .empty { padding: 2rem 1rem; text-align: center; color: var(--text-muted); font-size: 0.8rem; }

    /* ---- Attribution ---- */
    .map-attribution {
      position: absolute; bottom: 28px; left: 10px; z-index: 500;
      background: rgba(255,255,255,0.88); backdrop-filter: blur(4px);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 0.28rem 0.55rem; font-family: var(--font-heading); font-size: 0.6rem; color: var(--text-muted);
      line-height: 1.5; pointer-events: auto;
    }
    .map-attribution a { color: var(--text-muted); text-decoration: underline; text-underline-offset: 2px; }
    .map-attribution a:hover { color: var(--accent); }

    @media (max-width: 680px) {
      .app { flex-direction: column; }
      .map-pane { flex: 0 0 42vh; }
      .sidebar { flex: 1 1 auto; border-left: none; border-top: 1px solid var(--border); width: 100%; }
      .hdr-stats { display: none; }
    }
  </style>
</head>

  const REGION_COLORS = {
    'US-MA': '#2f6b46',
    'CA-SK': '#4a80a0',
    'CA-MB': '#c37b89',
    'CA-ON': '#a07840',
    'US-CA': '#8060a8',
    'CA-BC': '#2f9aa0',
    'US-NJ': '#c2622f',
    'US-NV': '#b8942a'
  };
  const REGION_LABELS = {
    'US-MA': 'Massachusetts',
    'CA-SK': 'Saskatchewan',
    'CA-MB': 'Manitoba',
    'CA-ON': 'Ontario',
    'US-CA': 'California',
    'CA-BC': 'British Columbia',
    'US-NJ': 'New Jersey',
    'US-NV': 'Nevada'
  };

  // Build species index
  const speciesMap = new Map();
  OBS.forEach(o => {
    if (!speciesMap.has(o.name)) speciesMap.set(o.name, {name: o.name, sci: o.sci, obs: []});
    speciesMap.get(o.name).obs.push(o);
  });
  const allSpecies = [...speciesMap.values()].sort((a, b) => a.name.localeCompare(b.name));

  // Stats
  document.getElementById('stat-sp').textContent = allSpecies.length;

  // Map
  const map = L.map('map', {zoomControl: true});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
    maxZoom: 18
  }).addTo(map);

  // Legend
  const legend = L.control({position: 'bottomright'});
  legend.onAdd = () => {
    const div = L.DomUtil.create('div', 'map-legend');
    const regions = [...new Set(OBS.map(o => o.region))];
    div.innerHTML = '<div class="legend-title">Region</div>' +
      regions.map(r => `<div class="legend-item"><span class="legend-dot" style="background:${REGION_COLORS[r]||'#90969d'}"></span>${REGION_LABELS[r]||r}</div>`).join('');
    return div;
  };
  legend.addTo(map);

  // Markers
  let activeSpecies = null;
  const markerData = {}; // id -> {marker, obs}
  const markerGroup = L.featureGroup().addTo(map);

  OBS.forEach(o => {
    const color = REGION_COLORS[o.region] || '#90969d';
    // Larger invisible circle underneath handles hover/click so you don't
    // need to land the cursor precisely on the small visible dot.
    const hit = L.circleMarker([o.lat, o.lon], {
      radius: 14, fillOpacity: 0, opacity: 0, weight: 0, pane: 'markerPane'
    });
    const m = L.circleMarker([o.lat, o.lon], {
      radius: 6, fillColor: color, color: '#fff',
      weight: 1.5, fillOpacity: 0.85, pane: 'markerPane', interactive: false
    });
    hit.bindTooltip(() => {
      const photo = photoCache.get(o.name);
      return `
        <div class="tip-name">${o.name}</div>
        ${photo ? `<img class="tip-photo" src="${photo}" alt="${o.name}">` : ''}
        <div class="tip-sci">${o.sci}</div>
        <div class="tip-loc">${o.loc}</div>
      `;
    }, {direction: 'top', offset: [0, -7], opacity: 1, sticky: false});
    hit.on('click', () => selectSpecies(o.name, true));
    markerData[o.id] = {marker: m, hit, obs: o};
    hit.addTo(markerGroup);
    m.addTo(markerGroup);
  });

  map.fitBounds(markerGroup.getBounds().pad(0.08));

  function selectSpecies(name, scrollSidebar = true) {
    activeSpecies = name;
    Object.values(markerData).forEach(({marker, obs}) => {
      const regionColor = REGION_COLORS[obs.region] || '#90969d';
      if (obs.name === name) {
        marker.setStyle({fillColor: regionColor, fillOpacity: 1, radius: 9, weight: 2.5, color: '#fff'});
        marker.setZIndexOffset(500);
      } else {
        marker.setStyle({fillColor: regionColor, fillOpacity: 0.85, radius: 6, weight: 1.5, color: '#fff'});
        marker.setZIndexOffset(0);
      }
    });
    const sel = Object.values(markerData).filter(d => d.obs.name === name).map(d => d.marker);
    if (sel.length) {
      const g = L.featureGroup(sel);
      const b = g.getBounds();
      const ne = b.getNorthEast(), sw = b.getSouthWest();
      if (Math.abs(ne.lat - sw.lat) < 0.001 && Math.abs(ne.lng - sw.lng) < 0.001) {
        map.setView(b.getCenter(), 14);
      } else {
        map.fitBounds(b.pad(0.5), {maxZoom: 14});
      }
    }
    document.getElementById('mapReset').classList.add('visible');
    document.querySelectorAll('.species-card').forEach(c => c.classList.toggle('active', c.dataset.name === name));
    if (scrollSidebar) {
      setTimeout(() => {
        const card = document.querySelector(`.species-card[data-name="${CSS.escape(name)}"]`);
        const list = document.getElementById('speciesList');
        if (card && list) {
          const cardRect = card.getBoundingClientRect();
          const listRect = list.getBoundingClientRect();
          const target = list.scrollTop + cardRect.top - listRect.top - (list.clientHeight - card.offsetHeight) / 2;
          list.scrollTo({top: Math.max(0, target), behavior: 'smooth'});
        }
      }, 100);
    }
  }

  function resetAll() {
    activeSpecies = null;
    Object.values(markerData).forEach(({marker, obs}) => {
      marker.setStyle({fillColor: REGION_COLORS[obs.region]||'#90969d', fillOpacity: 0.85, radius: 6, weight: 1.5, color: '#fff'});
      marker.setZIndexOffset(0);
    });
    map.fitBounds(markerGroup.getBounds().pad(0.08));
    document.getElementById('mapReset').classList.remove('visible');
    document.querySelectorAll('.species-card').forEach(c => c.classList.remove('active'));
  }
  document.getElementById('mapReset').addEventListener('click', resetAll);

  // Photo cache
  const photoCache = new Map();
  const photoElMap = new Map(); // name -> current DOM element

  function buildSpeciesList(filter) {
    const q = (filter || '').toLowerCase();
    const list = document.getElementById('speciesList');
    list.innerHTML = '';
    const filtered = allSpecies.filter(s =>
      s.name.toLowerCase().includes(q) || s.sci.toLowerCase().includes(q)
    );
    if (!filtered.length) {
      list.innerHTML = '<div class="empty">No species found.</div>';
      return;
    }
    filtered.forEach(s => {
      const regions = [...new Set(s.obs.map(o => o.region))];
      const card = document.createElement('div');
      card.className = 'species-card' + (activeSpecies === s.name ? ' active' : '');
      card.dataset.name = s.name;

      let photoEl;
      if (photoCache.has(s.name)) {
        photoEl = document.createElement('img');
        photoEl.className = 'sp-photo';
        photoEl.src = photoCache.get(s.name);
        photoEl.alt = s.name;
      } else {
        photoEl = document.createElement('div');
        photoEl.className = 'sp-placeholder';
        photoEl.innerHTML = '<i class="fas fa-feather-alt"></i>';
      }
      photoElMap.set(s.name, photoEl);

      const info = document.createElement('div');
      info.className = 'sp-info';
      info.innerHTML = `
        <div class="sp-name">${s.name}</div>
        <div class="sp-sci">${s.sci}</div>
        <div class="sp-meta">${regions.join(', ')}</div>
      `;
      card.appendChild(photoEl);
      card.appendChild(info);
      card.addEventListener('click', () => {
        if (activeSpecies === s.name) resetAll();
        else selectSpecies(s.name, false);
      });
      list.appendChild(card);
    });
  }

  buildSpeciesList('');

  document.getElementById('searchInput').addEventListener('input', function() {
    buildSpeciesList(this.value);
  });

  // Wikipedia photos
  async function loadPhotos() {
    const names = allSpecies.map(s => s.name);
    const BATCH = 20;
    for (let i = 0; i < names.length; i += BATCH) {
      const batch = names.slice(i, i + BATCH);
      const queryToOrig = {};
      batch.forEach(n => {
        queryToOrig[n.replace(/ /g, '_')] = n;
        queryToOrig[n] = n;
      });
      try {
        const titles = batch.map(n => n.replace(/ /g, '_')).join('|');
        const url = `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(titles)}&prop=pageimages&pithumbsize=120&format=json&origin=*&redirects=`;
        const resp = await fetch(url);
        const data = await resp.json();
        const q = data.query;
        const finalToOrig = {...queryToOrig};
        (q.normalized || []).forEach(({from, to}) => {
          const orig = finalToOrig[from];
          if (orig) finalToOrig[to] = orig;
        });
        (q.redirects || []).forEach(({from, to}) => {
          const orig = finalToOrig[from];
          if (orig) finalToOrig[to] = orig;
        });
        Object.values(q.pages || {}).forEach(page => {
          if (!page.thumbnail) return;
          const orig = finalToOrig[page.title];
          if (!orig) return;
          photoCache.set(orig, page.thumbnail.source);
          const el = photoElMap.get(orig);
          if (!el || !el.parentNode) return;
          const img = document.createElement('img');
          img.className = 'sp-photo';
          img.src = page.thumbnail.source;
          img.alt = orig;
          img.onerror = () => {};
          img.onload = () => {
            if (el.parentNode) { el.replaceWith(img); photoElMap.set(orig, img); }
          };
        });
      } catch(e) {}
      if (i + BATCH < names.length) await new Promise(r => setTimeout(r, 150));
    }
  }
  loadPhotos();
